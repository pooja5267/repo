<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Ticket Booking Interface</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6fb;
      font-family: Arial, sans-serif;
    }

    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      border-radius: 14px;
      padding: 28px 22px;
      margin-bottom: 1.5rem;
    }

    .movie-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
      height: 100%;
    }

    .movie-card:hover {
      transform: translateY(-4px);
    }

    .movie-poster {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .booking-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 18px;
      position: sticky;
      top: 14px;
    }

    .screen {
      background: #e9ecef;
      color: #495057;
      border-radius: 50px;
      text-align: center;
      padding: 8px;
      margin-bottom: 14px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .seat-layout {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
    }

    .seat {
      border: 1px solid #adb5bd;
      border-radius: 8px;
      text-align: center;
      padding: 8px 0;
      font-size: 0.86rem;
      cursor: pointer;
      user-select: none;
      background: #fff;
    }

    .seat.selected {
      background: #198754;
      color: #fff;
      border-color: #198754;
    }

    .seat.booked {
      background: #dc3545;
      color: #fff;
      border-color: #dc3545;
      cursor: not-allowed;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .summary-list li {
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {
      .movie-poster {
        height: 240px;
      }

      .seat-layout {
        grid-template-columns: repeat(6, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="hero text-center">
      <h1 class="mb-2">Movie Ticket Booking</h1>
      <p class="mb-0">Choose your movie, select seats, and view booking details instantly.</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <h4 class="mb-3">Now Showing</h4>
        <div class="row g-3" id="movieList"></div>

        <div class="mt-4">
          <h4 class="mb-3">Seat Selection</h4>
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div class="screen">SCREEN</div>
              <div class="seat-layout mb-3" id="seatLayout"></div>
              <div class="d-flex flex-wrap gap-3 small">
                <span><span class="legend-dot border border-secondary"></span>Available</span>
                <span><span class="legend-dot bg-success"></span>Selected</span>
                <span><span class="legend-dot bg-danger"></span>Booked</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="booking-panel">
          <h4 class="mb-3">Booking Summary</h4>

          <div class="mb-3">
            <label class="form-label fw-semibold">Selected Movie</label>
            <div id="selectedMovie" class="text-muted">Select a movie</div>
          </div>

          <div class="mb-3">
            <label for="showTiming" class="form-label fw-semibold">Show Timing</label>
            <select class="form-select" id="showTiming">
              <option value="">Choose timing</option>
            </select>
          </div>

          <ul class="list-unstyled summary-list">
            <li><strong>Seats:</strong> <span id="selectedSeats">None</span></li>
            <li><strong>Ticket Price:</strong> <span id="ticketPrice">Rs. 0</span> each</li>
            <li><strong>Total Tickets:</strong> <span id="ticketCount">0</span></li>
          </ul>

          <hr>
          <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
            <span>Total Amount</span>
            <span id="totalPrice">Rs. 0</span>
          </div>

          <button class="btn btn-primary w-100" id="bookNowBtn">Book Now</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const movies = [
      {
        id: 1,
        title: "Interstellar",
        price: 220,
        timings: ["10:00 AM", "1:30 PM", "6:45 PM"],
        poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 2,
        title: "The Batman",
        price: 250,
        timings: ["11:15 AM", "3:00 PM", "8:00 PM"],
        poster: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 3,
        title: "Avatar: The Way of Water",
        price: 280,
        timings: ["9:30 AM", "2:20 PM", "7:10 PM"],
        poster: "https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&w=900&q=80"
      }
    ];

    const totalSeats = 48;
    const bookedSeats = ["A3", "A4", "B6", "C2", "D7", "E1", "F5"];
    let selectedMovie = null;
    let selectedSeats = [];

    const movieList = document.getElementById("movieList");
    const seatLayout = document.getElementById("seatLayout");
    const selectedMovieElement = document.getElementById("selectedMovie");
    const showTimingElement = document.getElementById("showTiming");
    const selectedSeatsElement = document.getElementById("selectedSeats");
    const ticketPriceElement = document.getElementById("ticketPrice");
    const ticketCountElement = document.getElementById("ticketCount");
    const totalPriceElement = document.getElementById("totalPrice");
    const bookNowBtn = document.getElementById("bookNowBtn");

    function formatCurrency(amount) {
      return `Rs. ${amount}`;
    }

    function seatCodeFromIndex(index) {
      const rowLetter = String.fromCharCode(65 + Math.floor(index / 8));
      const seatNumber = (index % 8) + 1;
      return `${rowLetter}${seatNumber}`;
    }

    function renderMovies() {
      movieList.innerHTML = movies.map(movie => `
        <div class="col-md-6 col-lg-4">
          <div class="card movie-card">
            <img src="${movie.poster}" class="movie-poster" alt="${movie.title}">
            <div class="card-body">
              <h5 class="card-title mb-1">${movie.title}</h5>
              <p class="text-muted mb-2">Ticket: ${formatCurrency(movie.price)}</p>
              <button class="btn btn-sm btn-outline-primary w-100" onclick="selectMovie(${movie.id})">
                Select Movie
              </button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function renderTimings(movie) {
      showTimingElement.innerHTML = `
        <option value="">Choose timing</option>
        ${movie.timings.map(time => `<option value="${time}">${time}</option>`).join("")}
      `;
    }

    function renderSeats() {
      seatLayout.innerHTML = "";
      for (let i = 0; i < totalSeats; i += 1) {
        const seatCode = seatCodeFromIndex(i);
        const seatDiv = document.createElement("div");
        seatDiv.className = "seat";
        seatDiv.textContent = seatCode;
        seatDiv.dataset.seat = seatCode;

        if (bookedSeats.includes(seatCode)) {
          seatDiv.classList.add("booked");
        }
        if (selectedSeats.includes(seatCode)) {
          seatDiv.classList.add("selected");
        }

        seatDiv.addEventListener("click", () => {
          if (!selectedMovie) {
            alert("Please select a movie first.");
            return;
          }
          if (seatDiv.classList.contains("booked")) return;

          seatDiv.classList.toggle("selected");
          const clickedSeat = seatDiv.dataset.seat;

          if (seatDiv.classList.contains("selected")) {
            selectedSeats.push(clickedSeat);
          } else {
            selectedSeats = selectedSeats.filter(seat => seat !== clickedSeat);
          }
          updateSummary();
        });

        seatLayout.appendChild(seatDiv);
      }
    }

    function updateSummary() {
      const ticketPrice = selectedMovie ? selectedMovie.price : 0;
      const count = selectedSeats.length;
      const total = ticketPrice * count;

      selectedSeatsElement.textContent = count ? selectedSeats.join(", ") : "None";
      ticketPriceElement.textContent = formatCurrency(ticketPrice);
      ticketCountElement.textContent = count;
      totalPriceElement.textContent = formatCurrency(total);
    }

    function selectMovie(movieId) {
      selectedMovie = movies.find(movie => movie.id === movieId);
      selectedSeats = [];
      selectedMovieElement.textContent = selectedMovie.title;
      renderTimings(selectedMovie);
      renderSeats();
      updateSummary();
    }

    bookNowBtn.addEventListener("click", () => {
      const chosenTiming = showTimingElement.value;
      if (!selectedMovie) {
        alert("Please select a movie.");
        return;
      }
      if (!chosenTiming) {
        alert("Please choose a show timing.");
        return;
      }
      if (selectedSeats.length === 0) {
        alert("Please select at least one seat.");
        return;
      }

      alert(
        `Booking Confirmed!\nMovie: ${selectedMovie.title}\nTiming: ${chosenTiming}\nSeats: ${selectedSeats.join(", ")}\nTotal: ${totalPriceElement.textContent}`
      );
    });

    renderMovies();
    renderSeats();
    updateSummary();
  </script>
</body>
</html>
