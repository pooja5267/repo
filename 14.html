<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(155deg, #edf4ff, #f6fbff 45%, #eef9f5);
      min-height: 100vh;
      color: #16324f;
    }

    .hero {
      background: linear-gradient(135deg, #0d47a1, #1976d2, #42a5f5);
      color: #fff;
      border-radius: 14px;
      padding: 24px 20px;
      box-shadow: 0 10px 28px rgba(13, 71, 161, 0.25);
    }

    .card-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(22, 50, 79, 0.1);
      padding: 16px;
      height: 100%;
    }

    .kpi-box {
      border: 1px solid #e3edf8;
      border-radius: 10px;
      text-align: center;
      padding: 12px;
      background: #f9fcff;
      height: 100%;
    }

    .kpi-value {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .kpi-label {
      margin-top: 5px;
      font-size: 0.9rem;
      color: #5f6c7b;
    }

    .chart-lg {
      position: relative;
      height: 320px;
    }

    .chart-md {
      position: relative;
      height: 280px;
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="hero mb-4">
      <h1 class="mb-2">Student Performance Analysis Dashboard</h1>
      <p class="mb-0">Track marks, grade composition, and progress trends for each student.</p>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card-panel">
          <label for="studentSelect" class="form-label fw-semibold">Select Student</label>
          <select id="studentSelect" class="form-select"></select>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card-panel">
          <div class="row g-2">
            <div class="col-4">
              <div class="kpi-box">
                <div class="kpi-value" id="avgMarks">--</div>
                <div class="kpi-label">Average</div>
              </div>
            </div>
            <div class="col-4">
              <div class="kpi-box">
                <div class="kpi-value" id="bestSubject">--</div>
                <div class="kpi-label">Best Subject</div>
              </div>
            </div>
            <div class="col-4">
              <div class="kpi-box">
                <div class="kpi-value" id="overallGrade">--</div>
                <div class="kpi-label">Overall Grade</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="card-panel">
          <div class="section-title">Marks by Subject</div>
          <div class="chart-lg">
            <canvas id="marksBarChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card-panel">
          <div class="section-title">Grade Distribution</div>
          <div class="chart-md">
            <canvas id="gradePieChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="card-panel">
          <div class="section-title">Progress Over Time (Monthly Test Average)</div>
          <div class="chart-lg">
            <canvas id="progressLineChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const studentData = {
      "Aarav Sharma": {
        subjects: {
          Math: 92,
          Science: 88,
          English: 84,
          History: 79,
          Computer: 95
        },
        gradeDistribution: {
          "A (90-100)": 3,
          "B (80-89)": 1,
          "C (70-79)": 1,
          "D (<70)": 0
        },
        progressMonths: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
        progressScores: [78, 81, 84, 86, 88, 90]
      },
      "Diya Patel": {
        subjects: {
          Math: 78,
          Science: 83,
          English: 91,
          History: 87,
          Computer: 80
        },
        gradeDistribution: {
          "A (90-100)": 1,
          "B (80-89)": 3,
          "C (70-79)": 1,
          "D (<70)": 0
        },
        progressMonths: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
        progressScores: [72, 75, 77, 80, 83, 85]
      },
      "Kabir Mehta": {
        subjects: {
          Math: 65,
          Science: 72,
          English: 70,
          History: 68,
          Computer: 74
        },
        gradeDistribution: {
          "A (90-100)": 0,
          "B (80-89)": 0,
          "C (70-79)": 3,
          "D (<70)": 2
        },
        progressMonths: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
        progressScores: [60, 62, 66, 68, 70, 72]
      },
      "Sara Khan": {
        subjects: {
          Math: 89,
          Science: 91,
          English: 86,
          History: 93,
          Computer: 90
        },
        gradeDistribution: {
          "A (90-100)": 3,
          "B (80-89)": 2,
          "C (70-79)": 0,
          "D (<70)": 0
        },
        progressMonths: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
        progressScores: [80, 83, 85, 88, 90, 92]
      }
    };

    const studentSelect = document.getElementById("studentSelect");
    const avgMarks = document.getElementById("avgMarks");
    const bestSubject = document.getElementById("bestSubject");
    const overallGrade = document.getElementById("overallGrade");

    let marksBarChart;
    let gradePieChart;
    let progressLineChart;

    Object.keys(studentData).forEach((student) => {
      const option = document.createElement("option");
      option.value = student;
      option.textContent = student;
      studentSelect.appendChild(option);
    });

    studentSelect.value = "Aarav Sharma";

    function getOverallGrade(avg) {
      if (avg >= 90) return "A";
      if (avg >= 80) return "B";
      if (avg >= 70) return "C";
      return "D";
    }

    function updateDashboard() {
      const selectedStudent = studentSelect.value;
      const data = studentData[selectedStudent];

      const subjectLabels = Object.keys(data.subjects);
      const subjectMarks = Object.values(data.subjects);
      const gradeLabels = Object.keys(data.gradeDistribution);
      const gradeValues = Object.values(data.gradeDistribution);

      const avg = subjectMarks.reduce((sum, mark) => sum + mark, 0) / subjectMarks.length;
      const maxMark = Math.max(...subjectMarks);
      const topSubject = subjectLabels[subjectMarks.indexOf(maxMark)];

      avgMarks.textContent = avg.toFixed(1);
      bestSubject.textContent = topSubject;
      overallGrade.textContent = getOverallGrade(avg);

      const barConfig = {
        type: "bar",
        data: {
          labels: subjectLabels,
          datasets: [
            {
              label: "Marks",
              data: subjectMarks,
              backgroundColor: ["#1565c0", "#1e88e5", "#42a5f5", "#64b5f6", "#90caf9"],
              borderRadius: 8
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 100,
              title: {
                display: true,
                text: "Marks"
              }
            }
          }
        }
      };

      const pieConfig = {
        type: "pie",
        data: {
          labels: gradeLabels,
          datasets: [
            {
              data: gradeValues,
              backgroundColor: ["#2e7d32", "#f9a825", "#fb8c00", "#e53935"]
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "bottom"
            }
          }
        }
      };

      const lineConfig = {
        type: "line",
        data: {
          labels: data.progressMonths,
          datasets: [
            {
              label: "Average Test Score",
              data: data.progressScores,
              borderColor: "#5e35b1",
              backgroundColor: "rgba(94, 53, 177, 0.15)",
              fill: true,
              tension: 0.35,
              pointRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 100,
              title: {
                display: true,
                text: "Score"
              }
            }
          }
        }
      };

      if (marksBarChart) marksBarChart.destroy();
      if (gradePieChart) gradePieChart.destroy();
      if (progressLineChart) progressLineChart.destroy();

      marksBarChart = new Chart(document.getElementById("marksBarChart"), barConfig);
      gradePieChart = new Chart(document.getElementById("gradePieChart"), pieConfig);
      progressLineChart = new Chart(document.getElementById("progressLineChart"), lineConfig);
    }

    studentSelect.addEventListener("change", updateDashboard);
    updateDashboard();
  </script>
</body>
</html>
