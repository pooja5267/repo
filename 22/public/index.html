<!DOCTYPE html>
<html>
<head>
    <title>Used Vehicle Portal</title>
</head>
<body>

<h2> Add Vehicle</h2>

<input id="name" placeholder="Vehicle Name"><br><br>

<select id="type">
    <option value="">Select Type</option>
    <option value="Car">Car</option>
    <option value="Bike">Bike</option>
</select><br><br>

<input id="price" placeholder="Price"><br><br>

<textarea id="details" placeholder="Vehicle Details"></textarea><br><br>

<button onclick="addVehicle()">Add Vehicle</button>

<br><br>
<a href="view.html">View Vehicles</a>

<script>
async function addVehicle() {
    const name = document.getElementById("name").value;
    const type = document.getElementById("type").value;
    const price = document.getElementById("price").value;
    const details = document.getElementById("details").value;

    if (!name || !type || !price || !details) {
        alert("Fill all fields");
        return;
    }

    await fetch("http://localhost:3000/add-vehicle", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, type, price, details })
    });

    alert("Vehicle Added");
}
</script>

</body>
</html>
