<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Food Ordering App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      font-family: Arial, sans-serif;
    }

    .hero {
      background: linear-gradient(135deg, #ff7a18, #ffb347);
      color: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      margin-bottom: 1.5rem;
    }

    .category-btn.active {
      background-color: #0d6efd;
      color: #fff;
    }

    .food-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
      height: 100%;
    }

    .food-card:hover {
      transform: translateY(-4px);
    }

    .food-image {
      height: 180px;
      object-fit: cover;
      width: 100%;
    }

    .cart-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .cart-item {
      border-bottom: 1px solid #ececec;
      padding: 10px 0;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .empty-cart {
      color: #6c757d;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="hero text-center">
      <h1 class="mb-2">Food Ordering App</h1>
      <p class="mb-0">Browse delicious food, add to cart, and checkout in seconds.</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="d-flex flex-wrap gap-2 mb-3" id="categoryFilters">
          <button class="btn btn-outline-primary category-btn active" data-category="All">All</button>
          <button class="btn btn-outline-primary category-btn" data-category="Snacks">Snacks</button>
          <button class="btn btn-outline-primary category-btn" data-category="Meals">Meals</button>
          <button class="btn btn-outline-primary category-btn" data-category="Beverages">Beverages</button>
        </div>

        <div class="row g-3" id="menuContainer"></div>
      </div>

      <div class="col-lg-4">
        <div class="cart-panel">
          <h4 class="mb-3">Your Cart</h4>
          <div id="cartItems"></div>
          <hr>
          <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
            <span>Total:</span>
            <span id="totalAmount">Rs. 0</span>
          </div>
          <button class="btn btn-success w-100" id="checkoutBtn">Checkout</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const foodItems = [
      {
        id: 1,
        name: "Veg Sandwich",
        category: "Snacks",
        price: 120,
        image: "https://images.unsplash.com/photo-1528736235302-52922df5c122?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 2,
        name: "French Fries",
        category: "Snacks",
        price: 90,
        image: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 3,
        name: "Paneer Butter Masala",
        category: "Meals",
        price: 240,
        image: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 4,
        name: "Veg Biryani",
        category: "Meals",
        price: 220,
        image: "https://images.unsplash.com/photo-1563379091339-03246963d96c?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 5,
        name: "Cold Coffee",
        category: "Beverages",
        price: 110,
        image: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: 6,
        name: "Lemon Soda",
        category: "Beverages",
        price: 70,
        image: "https://images.unsplash.com/photo-1622480916113-c7f4cce0e056?auto=format&fit=crop&w=900&q=80"
      }
    ];

    const cart = {};
    let selectedCategory = "All";

    const menuContainer = document.getElementById("menuContainer");
    const cartItemsContainer = document.getElementById("cartItems");
    const totalAmountElement = document.getElementById("totalAmount");
    const categoryButtons = document.querySelectorAll(".category-btn");
    const checkoutBtn = document.getElementById("checkoutBtn");

    function formatCurrency(amount) {
      return `Rs. ${amount}`;
    }

    function renderMenu() {
      const filteredItems = selectedCategory === "All"
        ? foodItems
        : foodItems.filter(item => item.category === selectedCategory);

      menuContainer.innerHTML = filteredItems.map(item => `
        <div class="col-md-6">
          <div class="card food-card">
            <img src="${item.image}" class="food-image" alt="${item.name}">
            <div class="card-body">
              <h5 class="card-title mb-1">${item.name}</h5>
              <p class="text-muted mb-2">${item.category}</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold">${formatCurrency(item.price)}</span>
                <button class="btn btn-sm btn-primary" onclick="addToCart(${item.id})">Add</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function addToCart(itemId) {
      if (cart[itemId]) {
        cart[itemId].quantity += 1;
      } else {
        const item = foodItems.find(food => food.id === itemId);
        cart[itemId] = { ...item, quantity: 1 };
      }
      renderCart();
    }

    function removeFromCart(itemId) {
      if (!cart[itemId]) return;

      cart[itemId].quantity -= 1;
      if (cart[itemId].quantity <= 0) {
        delete cart[itemId];
      }
      renderCart();
    }

    function calculateTotal() {
      return Object.values(cart).reduce((total, item) => {
        return total + item.price * item.quantity;
      }, 0);
    }

    function renderCart() {
      const cartArray = Object.values(cart);

      if (cartArray.length === 0) {
        cartItemsContainer.innerHTML = `<p class="empty-cart mb-0">Your cart is empty.</p>`;
        totalAmountElement.textContent = formatCurrency(0);
        return;
      }

      cartItemsContainer.innerHTML = cartArray.map(item => `
        <div class="cart-item">
          <div class="d-flex justify-content-between">
            <div>
              <strong>${item.name}</strong>
              <div class="text-muted small">${formatCurrency(item.price)} each</div>
            </div>
            <div class="text-end">
              <div class="fw-semibold">${formatCurrency(item.price * item.quantity)}</div>
              <div class="btn-group btn-group-sm mt-1" role="group">
                <button class="btn btn-outline-danger" onclick="removeFromCart(${item.id})">-</button>
                <button class="btn btn-outline-secondary" disabled>${item.quantity}</button>
                <button class="btn btn-outline-success" onclick="addToCart(${item.id})">+</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      totalAmountElement.textContent = formatCurrency(calculateTotal());
    }

    function setActiveCategoryButton(activeCategory) {
      categoryButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.category === activeCategory);
      });
    }

    categoryButtons.forEach(button => {
      button.addEventListener("click", () => {
        selectedCategory = button.dataset.category;
        setActiveCategoryButton(selectedCategory);
        renderMenu();
      });
    });

    checkoutBtn.addEventListener("click", () => {
      alert("Order placed successfully!");
    });

    renderMenu();
    renderCart();
  </script>
</body>
</html>
