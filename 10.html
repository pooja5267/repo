<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookNest - Online Bookstore</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: #f6f8fb;
    }

    .brand-gradient {
      background: linear-gradient(90deg, #0d6efd, #0dcaf0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .book-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 0;
      box-shadow: 0 0.2rem 0.6rem rgba(0, 0, 0, 0.08);
      height: 100%;
    }

    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }

    .book-img {
      height: 220px;
      object-fit: cover;
    }

    .cart-panel {
      position: sticky;
      top: 90px;
    }

    .price-tag {
      font-size: 1.1rem;
      font-weight: 600;
      color: #198754;
    }

    .cart-empty {
      color: #6c757d;
      font-style: italic;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand brand-gradient" href="#">BookNest</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#bookNavbar"
        aria-controls="bookNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="bookNavbar">
        <ul class="navbar-nav ms-auto" id="categoryNav"></ul>
        <a href="#cartSection" class="btn btn-warning ms-lg-3 mt-2 mt-lg-0">
          Cart (<span id="cartCount">0</span>)
        </a>
      </div>
    </div>
  </nav>

  <header class="py-4 py-md-5 bg-light border-bottom">
    <div class="container">
      <h1 class="display-6 fw-bold mb-2">Your Favorite Books, One Click Away</h1>
      <p class="text-muted mb-0">
        Browse by category and add books to your cart instantly.
      </p>
    </div>
  </header>

  <main class="container my-4">
    <div class="row g-4">
      <section class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h4 mb-0">Books</h2>
          <span class="badge text-bg-primary" id="activeCategoryBadge">All</span>
        </div>
        <div class="row g-4" id="bookList"></div>
      </section>

      <aside class="col-lg-4" id="cartSection">
        <div class="card cart-panel shadow-sm">
          <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">Shopping Cart</h2>
          </div>
          <div class="card-body">
            <ul class="list-group mb-3" id="cartItems"></ul>
            <div id="checkoutMessage" class="mb-3"></div>
            <div class="d-flex justify-content-between align-items-center">
              <strong>Total:</strong>
              <strong id="cartTotal" class="text-success">Rs. 0</strong>
            </div>
            <button class="btn btn-primary w-100 mt-3" id="checkoutBtn">
              Checkout
            </button>
            <button class="btn btn-outline-danger w-100 mt-3" id="clearCartBtn">
              Clear Cart
            </button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const categories = ["All", "Fiction", "Non-fiction", "Academic", "Biography"];

    const books = [
      {
        id: 1,
        title: "The Silent Patient",
        category: "Fiction",
        price: 499,
        details: "A gripping psychological thriller by Alex Michaelides.",
        image: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=600&q=80"
      },
      {
        id: 2,
        title: "Atomic Habits",
        category: "Non-fiction",
        price: 699,
        details: "Practical strategies to build good habits and break bad ones.",
        image: "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=600&q=80"
      },
      {
        id: 3,
        title: "Engineering Mathematics",
        category: "Academic",
        price: 899,
        details: "Comprehensive reference for core engineering concepts.",
        image: "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&w=600&q=80"
      },
      {
        id: 4,
        title: "Educated",
        category: "Biography",
        price: 550,
        details: "A memoir by Tara Westover about resilience and self-invention.",
        image: "https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&w=600&q=80"
      },
      {
        id: 5,
        title: "The Alchemist",
        category: "Fiction",
        price: 399,
        details: "A timeless story about following your dreams.",
        image: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=600&q=80"
      },
      {
        id: 6,
        title: "Sapiens",
        category: "Non-fiction",
        price: 799,
        details: "A brief history of humankind by Yuval Noah Harari.",
        image: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=600&q=80"
      }
    ];

    let selectedCategory = "All";
    const cart = JSON.parse(localStorage.getItem("bookNestCart") || "[]");

    const categoryNav = document.getElementById("categoryNav");
    const bookList = document.getElementById("bookList");
    const cartItems = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");
    const clearCartBtn = document.getElementById("clearCartBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const activeCategoryBadge = document.getElementById("activeCategoryBadge");
    const cartCount = document.getElementById("cartCount");
    const checkoutMessage = document.getElementById("checkoutMessage");

    function saveCart() {
      localStorage.setItem("bookNestCart", JSON.stringify(cart));
    }

    function renderCategories() {
      categoryNav.innerHTML = categories
        .map(
          (category) => `
          <li class="nav-item">
            <button
              class="btn btn-sm mx-1 my-1 ${selectedCategory === category ? "btn-primary" : "btn-outline-primary"}"
              onclick="filterByCategory('${category}')"
            >
              ${category}
            </button>
          </li>
        `
        )
        .join("");
    }

    function filterByCategory(category) {
      selectedCategory = category;
      activeCategoryBadge.textContent = category;
      renderCategories();
      renderBooks();
    }

    function renderBooks() {
      const filteredBooks =
        selectedCategory === "All"
          ? books
          : books.filter((book) => book.category === selectedCategory);

      if (filteredBooks.length === 0) {
        bookList.innerHTML = `
          <div class="col-12">
            <div class="alert alert-warning mb-0">No books found in this category.</div>
          </div>
        `;
        return;
      }

      bookList.innerHTML = filteredBooks
        .map(
          (book) => `
          <div class="col-md-6">
            <div class="card book-card">
              <img src="${book.image}" class="card-img-top book-img" alt="${book.title}" />
              <div class="card-body d-flex flex-column">
                <span class="badge text-bg-secondary mb-2 align-self-start">${book.category}</span>
                <h5 class="card-title">${book.title}</h5>
                <p class="card-text text-muted small flex-grow-1">${book.details}</p>
                <p class="price-tag mb-3">Rs. ${book.price}</p>
                <button class="btn btn-success w-100" onclick="addToCart(${book.id})">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        `
        )
        .join("");
    }

    function addToCart(bookId) {
      const selectedBook = books.find((book) => book.id === bookId);
      if (!selectedBook) return;

      const existingItem = cart.find((item) => item.id === bookId);
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({ ...selectedBook, quantity: 1 });
      }
      saveCart();
      renderCart();
    }

    function removeFromCart(bookId) {
      const itemIndex = cart.findIndex((item) => item.id === bookId);
      if (itemIndex === -1) return;

      if (cart[itemIndex].quantity > 1) {
        cart[itemIndex].quantity -= 1;
      } else {
        cart.splice(itemIndex, 1);
      }
      saveCart();
      renderCart();
    }

    function clearCart() {
      cart.length = 0;
      saveCart();
      renderCart();
    }

    function checkout() {
      if (cart.length === 0) {
        checkoutMessage.innerHTML = `
          <div class="alert alert-warning py-2 mb-0">Your cart is empty. Add books before checkout.</div>
        `;
        return;
      }

      checkoutMessage.innerHTML = `
        <div class="alert alert-success py-2 mb-0">Order placed successfully! Thank you for shopping with BookNest.</div>
      `;
      cart.length = 0;
      saveCart();
      renderCart();
    }

    function renderCart() {
      if (cart.length === 0) {
        cartItems.innerHTML = `
          <li class="list-group-item cart-empty text-center">Your cart is empty.</li>
        `;
        cartTotal.textContent = "Rs. 0";
        cartCount.textContent = "0";
        checkoutBtn.disabled = true;
        return;
      }

      cartItems.innerHTML = cart
        .map(
          (item) => `
          <li class="list-group-item d-flex justify-content-between align-items-start">
            <div class="me-2">
              <div class="fw-semibold">${item.title}</div>
              <small class="text-muted">Rs. ${item.price} x ${item.quantity}</small>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${item.id})">
              Remove
            </button>
          </li>
        `
        )
        .join("");

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartTotal.textContent = `Rs. ${total}`;
      cartCount.textContent = String(count);
      checkoutBtn.disabled = false;
    }

    clearCartBtn.addEventListener("click", clearCart);
    checkoutBtn.addEventListener("click", checkout);

    renderCategories();
    renderBooks();
    renderCart();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
